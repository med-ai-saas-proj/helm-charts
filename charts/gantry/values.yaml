replicaCount: 1

image:
  repository: ghcr.io/med-ai-saas-proj/gantry
  pullPolicy: Always
  tag: "master"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

# Gantry application config (rendered into TOML ConfigMap)
config:
  stage: "PROD"
  allowed_origins: ["*"]
  host: "0.0.0.0"
  port: 8000
  internal_port: 9000
  log_level: "WARNING"

  db:
    cache_ttl: "PT1H"

  apikey:
    secret_length: 32
    permissions:
      - { id: "chat.read", name: "Chat Read", description: "Allow reading chat resources" }
      - { id: "chat.run", name: "Chat Run", description: "Allow running chat operations" }
      - { id: "conversation.read", name: "Conversation Read", description: "Allow reading conversations" }
      - { id: "conversation.write", name: "Conversation Write", description: "Allow writing conversations" }
      - { id: "conversation.delete", name: "Conversation Delete", description: "Allow deleting conversations" }
      - { id: "file.read", name: "File Read", description: "Allow reading files" }
      - { id: "file.write", name: "File Write", description: "Allow uploading files" }
      - { id: "file.delete", name: "File Delete", description: "Allow deleting files" }
      - { id: "rag.read", name: "RAG Read", description: "Allow reading RAG resources" }
      - { id: "rag.write", name: "RAG Write", description: "Allow writing RAG resources" }

  keycloak:
    server_url: "http://gantry-keycloak:8080/"
    realm_name: "gantry"
    service_client_id: "gantry-backend"

  auth:
    client_id: "gantry-frontend"
    admin_client_id: "gantry-admin"

  billing:
    invoice_process_interval_seconds: 60
    transaction_expire_check_interval_seconds: 60

  user_log:
    loki_url: "http://gantry-loki:3100/"

  conversation:
    cache_ttl: 600
    cache_limit: 50

  file_storage:
    s3_bucket_name: ""
    s3_region_name: ""
    s3_endpoint_url: ""
    s3_presigned_url_expiry_seconds: 3600
    redis_cache_expiry_seconds: 3600

  organization:
    invite_redirect_uri: ""
    deletion_cancel_window_days: 30
    deletion_worker_interval_seconds: 60

  observability:
    exporter_otlp_endpoint: "http://localhost:4317/"
    exporter_otlp_protocol: "grpc"
    traces: "disabled"
    metrics: "prometheus"
    logs: "disabled"
    prometheus_port: 9000

  rag:
    embedding_model: "text-embedding-3-small"
    embedding_openai_base_url: "https://api.openai.com/v1"
    reranker_model: ""
    reranker_base_url: ""
    supported_langs: "simple"
    embedding_batch_size: 100
    rag_store_half_precision: false
    rag_store_dimension: 1536
    rag_store_index_type: "hnsw"
    rag_store_index_params_hnsw_m: 16
    rag_store_index_params_hnsw_ef_construction: 200
    rag_store_index_params_ivfflat_lists: 100
    rag_store_ops_type: "vector_cosine_ops"

  ai_gateway:
    summary_model: null
    # models:
    #   gpt-4:
    #     provider: openai
    #     model_id: gpt-4
    #     context_window: 128000
    #     base_url: null
    #     fallback: null
    models: {}

  api_gateway:
    request_timeout: "PT30S"
    routes: {}

# Raw TOML override (if set, used instead of templated config)
rawConfig: ""

# Secrets injected as environment variables (GANTRY_SERVER__<KEY>)
secrets: {}
  # DB__TIMESCALE_CONNECTION_URI: "postgresql+asyncpg://gantry:pass@gantry-gantry-db:5432/gantry"
  # DB__PGVECTOR_CONNECTION_URI: "postgresql+asyncpg://gantry:pass@gantry-gantry-db:5432/gantry"
  # DB__REDIS_CONNECTION_URI: "redis://gantry-redis-master:6379/0"
  # APIKEY__SECRET: "your-minimum-16-char-secret-key"
  # KEYCLOAK__SERVICE_CLIENT_SECRET: ""
  # BILLING__STRIPE_SECRET_KEY: ""
  # BILLING__STRIPE_WEBHOOK_SECRET: ""
  # RAG__EMBEDDING_OPENAI_API_KEY: ""
  # RAG__RERANKER_API_KEY: ""
  # FILE_STORAGE__S3_ACCESS_KEY_ID: ""
  # FILE_STORAGE__S3_SECRET_ACCESS_KEY: ""
  # AI_GATEWAY__MODELS__<MODEL_NAME>__API_KEY: ""

# Reference an existing Secret instead of creating one
existingSecret: ""

# Extra environment variables (beyond secrets)
extraEnvVars: []

migration:
  enabled: true

service:
  type: ClusterIP
  port: 8000
  internalPort: 9000

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: gantry.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  limits:
    cpu: 1
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80

nodeSelector: {}
tolerations: []
affinity: {}

# --- Subchart configuration ---

keycloak:
  enabled: false
  keycloakConfigCli:
    enabled: true
    existingConfigmap: "gantry-keycloak-realm"

loki:
  enabled: false
  deploymentMode: SingleBinary
  loki:
    commonConfig:
      replication_factor: 1
    storage:
      type: filesystem
    schemaConfig:
      configs:
        - from: "2024-01-01"
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: index_
            period: 24h
  singleBinary:
    replicas: 1
  read:
    replicas: 0
  backend:
    replicas: 0
  write:
    replicas: 0

redis:
  enabled: false
  architecture: standalone
  auth:
    enabled: false

timescaledb:
  enabled: false
  global:
    security:
      allowInsecureImages: true
  image:
    registry: docker.io
    repository: timescale/timescaledb-ha
    tag: pg17
  auth:
    username: gantry
    password: ""
    database: gantry
  primary:
    initdb:
      scripts:
        create-extensions.sql: |
          CREATE EXTENSION IF NOT EXISTS timescaledb;
          CREATE EXTENSION IF NOT EXISTS vector;

# Custom PostgreSQL with timescaledb + pgvector + pg_textsearch
gantry-db:
  enabled: false
  global:
    security:
      allowInsecureImages: true
  image:
    registry: docker.io
    repository: thng292/timescaledb-with-pg_textsearch
    tag: latest
  auth:
    username: gantry
    password: ""
    database: gantry
  postgresqlSharedPreloadLibraries: "timescaledb,pg_textsearch"
  primary:
    initdb:
      scripts:
        create-extensions.sql: |
          CREATE EXTENSION IF NOT EXISTS timescaledb;
          CREATE EXTENSION IF NOT EXISTS vector;
          CREATE EXTENSION IF NOT EXISTS pg_textsearch;

user-dashboard:
  enabled: false
  ingress:
    enabled: false
    hostname: app.gantry.local
    path: /
    pathType: Prefix
    ingressClassName: ""
    annotations: {}
    tls: false
  staticSiteConfigmap: ""
  serverBlock: |
    server {
      listen 8080;
      root /app;
      index index.html;
      location / {
        try_files $uri $uri/ /index.html;
      }
      location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
      }
    }
  initContainers:
    - name: fetch-assets
      image: alpine:3
      command:
        - sh
        - -c
        - wget -qO- "https://github.com/med-ai-saas-proj/user-dashboard/releases/download/latest/dist.tar.gz" | tar xz -C /app/
      volumeMounts:
        - name: static-files
          mountPath: /app
  extraVolumes:
    - name: static-files
      emptyDir: {}
  extraVolumeMounts:
    - name: static-files
      mountPath: /app

admin-dashboard:
  enabled: false
  ingress:
    enabled: false
    hostname: admin.gantry.local
    path: /
    pathType: Prefix
    ingressClassName: ""
    annotations: {}
    tls: false
  staticSiteConfigmap: ""
  serverBlock: |
    server {
      listen 8080;
      root /app;
      index index.html;
      location / {
        try_files $uri $uri/ /index.html;
      }
      location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
      }
    }
  initContainers:
    - name: fetch-assets
      image: alpine:3
      command:
        - sh
        - -c
        - wget -qO- "https://github.com/med-ai-saas-proj/admin-dashboard/releases/download/latest/dist.tar.gz" | tar xz -C /app/
      volumeMounts:
        - name: static-files
          mountPath: /app
  extraVolumes:
    - name: static-files
      emptyDir: {}
  extraVolumeMounts:
    - name: static-files
      mountPath: /app
