apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "gantry.fullname" . }}
  labels:
    {{- include "gantry.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "gantry.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
      labels:
        {{- include "gantry.labels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "gantry.serviceAccountName" . }}
      {{- if .Values.migration.enabled }}
      initContainers:
        - name: migrate
          image: {{ include "gantry.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /app/.venv/bin/python
            - -m
            - gantry
            - server
            - --config-file
            - /app/gantry.toml
            - migrate
          volumeMounts:
            - name: config
              mountPath: /app/gantry.toml
              subPath: gantry.toml
              readOnly: true
          {{- if .Values.secrets }}
          env:
            {{- range $key, $value := .Values.secrets }}
            {{- if $value }}
            - name: GANTRY_SERVER__{{ $key }}
              valueFrom:
                secretKeyRef:
                  name: {{ include "gantry.secretName" $ }}
                  key: {{ $key }}
            {{- end }}
            {{- end }}
          {{- end }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: {{ include "gantry.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /app/.venv/bin/python
            - -m
            - gantry
            - server
            - --config-file
            - /app/gantry.toml
          ports:
            - name: http
              containerPort: {{ .Values.config.port }}
              protocol: TCP
            - name: internal
              containerPort: {{ .Values.config.internal_port }}
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /ready
              port: internal
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: internal
            initialDelaySeconds: 15
            periodSeconds: 20
          {{- if .Values.secrets }}
          env:
            {{- range $key, $value := .Values.secrets }}
            {{- if $value }}
            - name: GANTRY_SERVER__{{ $key }}
              valueFrom:
                secretKeyRef:
                  name: {{ include "gantry.secretName" $ }}
                  key: {{ $key }}
            {{- end }}
            {{- end }}
          {{- end }}
          {{- with .Values.extraEnvVars }}
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: config
              mountPath: /app/gantry.toml
              subPath: gantry.toml
              readOnly: true
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "gantry.configName" . }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
