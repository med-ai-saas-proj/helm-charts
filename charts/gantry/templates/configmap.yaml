apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "gantry.configName" . }}
  labels:
    {{- include "gantry.labels" . | nindent 4 }}
data:
  gantry.toml: |
    {{- if .Values.rawConfig }}
    {{ .Values.rawConfig | nindent 4 }}
    {{- else }}
    stage = {{ .Values.config.stage | quote }}
    allowed_origins = {{ .Values.config.allowed_origins | toJson }}
    host = {{ .Values.config.host | quote }}
    port = {{ .Values.config.port }}
    internal_port = {{ .Values.config.internal_port }}
    log_level = {{ .Values.config.log_level | quote }}

    [db]
    cache_ttl = {{ .Values.config.db.cache_ttl | quote }}

    [apikey]
    secret_length = {{ .Values.config.apikey.secret_length }}
    {{- if .Values.config.apikey.permissions }}
    permissions = [
    {{- range .Values.config.apikey.permissions }}
        { id = {{ .id | quote }}, name = {{ .name | quote }}, description = {{ .description | quote }} },
    {{- end }}
    ]
    {{- end }}

    [keycloak]
    server_url = {{ .Values.config.keycloak.server_url | quote }}
    realm_name = {{ .Values.config.keycloak.realm_name | quote }}
    service_client_id = {{ .Values.config.keycloak.service_client_id | quote }}

    [auth]
    client_id = {{ .Values.config.auth.client_id | quote }}
    admin_client_id = {{ .Values.config.auth.admin_client_id | quote }}

    [billing]
    invoice_process_interval_seconds = {{ .Values.config.billing.invoice_process_interval_seconds }}
    transaction_expire_check_interval_seconds = {{ .Values.config.billing.transaction_expire_check_interval_seconds }}

    [user_log]
    loki_url = {{ .Values.config.user_log.loki_url | quote }}

    [conversation]
    cache_ttl = {{ .Values.config.conversation.cache_ttl }}
    cache_limit = {{ .Values.config.conversation.cache_limit }}

    [file_storage]
    {{- with .Values.config.file_storage }}
    s3_bucket_name = {{ .s3_bucket_name | quote }}
    s3_region_name = {{ .s3_region_name | quote }}
    s3_endpoint_url = {{ .s3_endpoint_url | quote }}
    s3_presigned_url_expiry_seconds = {{ .s3_presigned_url_expiry_seconds }}
    redis_cache_expiry_seconds = {{ .redis_cache_expiry_seconds }}
    {{- end }}

    [organization]
    {{- with .Values.config.organization }}
    invite_redirect_uri = {{ .invite_redirect_uri | quote }}
    deletion_cancel_window_days = {{ .deletion_cancel_window_days }}
    deletion_worker_interval_seconds = {{ .deletion_worker_interval_seconds }}
    {{- end }}

    [observability]
    {{- with .Values.config.observability }}
    exporter_otlp_endpoint = {{ .exporter_otlp_endpoint | quote }}
    exporter_otlp_protocol = {{ .exporter_otlp_protocol | quote }}
    traces = {{ .traces | quote }}
    metrics = {{ .metrics | quote }}
    logs = {{ .logs | quote }}
    prometheus_port = {{ .prometheus_port }}
    {{- end }}

    [rag]
    {{- with .Values.config.rag }}
    embedding_model = {{ .embedding_model | quote }}
    embedding_openai_base_url = {{ .embedding_openai_base_url | quote }}
    reranker_model = {{ .reranker_model | quote }}
    reranker_base_url = {{ .reranker_base_url | quote }}
    supported_langs = {{ .supported_langs | quote }}
    embedding_batch_size = {{ .embedding_batch_size }}
    rag_store_half_precision = {{ .rag_store_half_precision }}
    rag_store_dimension = {{ .rag_store_dimension }}
    rag_store_index_type = {{ .rag_store_index_type | quote }}
    rag_store_index_params_hnsw_m = {{ .rag_store_index_params_hnsw_m }}
    rag_store_index_params_hnsw_ef_construction = {{ .rag_store_index_params_hnsw_ef_construction }}
    rag_store_index_params_ivfflat_lists = {{ .rag_store_index_params_ivfflat_lists }}
    rag_store_ops_type = {{ .rag_store_ops_type | quote }}
    {{- end }}

    [ai_gateway]
    {{- if .Values.config.ai_gateway.summary_model }}
    summary_model = {{ .Values.config.ai_gateway.summary_model | quote }}
    {{- end }}

    {{- if .Values.config.ai_gateway.models }}
    [ai_gateway.models]
    {{- range $name, $model := .Values.config.ai_gateway.models }}
    {{ $name | quote }} = { provider = {{ $model.provider | quote }}, model_id = {{ $model.model_id | quote }}, context_window = {{ $model.context_window }}{{- if $model.base_url }}, base_url = {{ $model.base_url | quote }}{{- end }}{{- if $model.fallback }}, fallback = {{ $model.fallback | toJson }}{{- end }} }
    {{- end }}
    {{- end }}

    [api_gateway]
    request_timeout = {{ .Values.config.api_gateway.request_timeout | quote }}
    {{- if .Values.config.api_gateway.routes }}
    [api_gateway.routes]
    {{- range $name, $route := .Values.config.api_gateway.routes }}
    {{ $name | quote }} = { address = {{ $route.address | quote }}{{- if $route.required_perms }}, required_perms = {{ $route.required_perms | toJson }}{{- end }}{{- if $route.openapi_json_url }}, openapi_json_url = {{ $route.openapi_json_url | quote }}{{- end }} }
    {{- end }}
    {{- end }}
    {{- end }}
